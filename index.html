<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돌봄매트 · 맘카페 업로드 스케줄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --bg-warm: #f5f0ea;
    --surface: #ffffff;
    --border: #e8e2da;
    --border-light: #f0ebe4;
    --text: #2c2418;
    --text-mid: #6b5d4f;
    --text-dim: #a09484;
    --primary: #d4603a;
    --primary-soft: rgba(212, 96, 58, 0.08);
    --primary-glow: rgba(212, 96, 58, 0.15);
    --secondary: #3a7d6e;
    --gyeonggi: #c56b91;
    --busan: #4a8db7;
    --tag-week: #b07328;
    --tag-day: #3a7d6e;
    --tag-month: #7b5ea7;
    --tag-free: #c56b91;
    --shadow-sm: 0 1px 3px rgba(44,36,24,0.04), 0 1px 2px rgba(44,36,24,0.03);
    --shadow-md: 0 4px 16px rgba(44,36,24,0.06), 0 2px 6px rgba(44,36,24,0.04);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 0%, rgba(212,96,58,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(58,125,110,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ─── HEADER ─── */
  .header { text-align: center; margin-bottom: 36px; }

  .header-brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px 5px 8px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .header-brand .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--secondary);
    animation: pulse 2.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header h1 {
    font-size: 26px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.8px;
    margin-bottom: 6px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .today-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 7px 18px;
    background: var(--primary);
    color: white;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 2px 12px var(--primary-glow);
  }

  .today-pill svg { width: 14px; height: 14px; }

  /* ─── DAY SELECTOR ─── */
  .day-bar {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .day-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    width: 68px; height: 68px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
  }

  .day-btn .label {
    font-size: 17px;
    font-weight: 800;
    color: var(--text-mid);
    transition: color 0.2s;
  }

  .day-btn .num {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .day-btn:hover {
    border-color: var(--primary);
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }

  .day-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 4px 20px var(--primary-glow);
  }

  .day-btn.active .label { color: white; }
  .day-btn.active .num { color: rgba(255,255,255,0.75); }

  .day-btn.today::before {
    content: '';
    position: absolute;
    top: 5px; right: 5px;
    width: 6px; height: 6px;
    background: var(--secondary);
    border-radius: 50%;
  }

  .day-btn.active.today::before { background: white; }

  .day-btn.weekend { background: var(--bg-warm); }
  .day-btn.weekend .label { color: var(--text-dim); }
  .day-btn.weekend.active { background: var(--primary); }
  .day-btn.weekend.active .label { color: white; }

  /* ─── ACTION BUTTONS ─── */
  .actions {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-md);
  }

  .action-main {
    width: 100%;
    padding: 15px 24px;
    border: none;
    border-radius: var(--radius);
    background: var(--primary);
    color: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 3px 16px var(--primary-glow);
    letter-spacing: -0.2px;
  }

  .action-main:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(212,96,58,0.25);
  }

  .action-main:active { transform: scale(0.985); }

  .action-main:disabled {
    background: var(--border);
    color: var(--text-dim);
    box-shadow: none;
    cursor: default;
  }

  .action-hint {
    text-align: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .action-sub-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .action-sub {
    flex: 1;
    padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .action-sub:hover {
    border-color: var(--text-dim);
    background: var(--bg-warm);
    transform: translateY(-1px);
  }

  .action-sub .icon { font-size: 15px; line-height: 1; }

  /* ─── REGION ─── */
  .region { margin-bottom: 20px; }

  .region-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
    margin-bottom: 8px;
  }

  .region-icon {
    width: 24px; height: 24px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: white;
  }

  .region-icon.경기 { background: var(--gyeonggi); }
  .region-icon.부산 { background: var(--busan); }

  .region-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-mid);
    letter-spacing: 0.5px;
  }

  .region-cnt {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--bg-warm);
    padding: 2px 10px;
    border-radius: 100px;
  }

  /* ─── CAFE CARDS ─── */
  .cafe-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cafe {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: var(--shadow-sm);
    animation: slideUp 0.3s ease both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cafe:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
    transform: translateX(3px);
    box-shadow: var(--shadow-md);
  }

  .cafe-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: var(--bg);
  }

  .cafe.on .cafe-check {
    background: var(--primary);
    border-color: var(--primary);
  }

  .cafe.on .cafe-check::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }

  .cafe-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cafe-days {
    display: none;
    gap: 2px;
    flex-shrink: 0;
  }

  @media (min-width: 580px) {
    .cafe-days { display: flex; }
  }

  .mini-day {
    width: 20px; height: 20px;
    border-radius: 5px;
    font-size: 8px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    background: var(--bg);
    transition: all 0.15s;
  }

  .mini-day.on {
    background: var(--primary-soft);
    color: var(--primary);
    font-weight: 800;
  }

  .mini-day.current {
    background: var(--primary);
    color: white;
  }

  .cafe-tag {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }

  .cafe-tag.t-주 { color: var(--tag-week); background: rgba(176,115,40,0.08); }
  .cafe-tag.t-일 { color: var(--tag-day); background: rgba(58,125,110,0.08); }
  .cafe-tag.t-월 { color: var(--tag-month); background: rgba(123,94,167,0.08); }
  .cafe-tag.t-제한X { color: var(--tag-free); background: rgba(197,107,145,0.08); }

  .cafe-arrow {
    flex-shrink: 0;
    width: 16px; height: 16px;
    color: var(--text-dim);
    opacity: 0;
    transform: translateX(-4px);
    transition: all 0.2s;
  }

  .cafe:hover .cafe-arrow {
    opacity: 1;
    transform: translateX(0);
    color: var(--primary);
  }

  /* ─── NOTICE ─── */
  .notice {
    margin-top: 32px;
    padding: 14px 18px;
    background: var(--bg-warm);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.7;
  }

  .notice-title {
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 420px) {
    .day-btn { width: 44px; height: 56px; border-radius: 12px; }
    .day-btn .label { font-size: 15px; }
    .day-btn .num { font-size: 9px; }
    .action-sub-row { flex-direction: column; }
    .cafe { padding: 10px 12px; }
    .cafe-name { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-brand"><div class="dot"></div>돌봄매트</div>
    <h1>맘카페 업로드 스케줄</h1>
    <div class="header-sub">요일 선택 → 버튼 한 번으로 글쓰기 페이지 일괄 오픈</div>
    <div class="today-pill" id="todayPill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="todayText"></span>
    </div>
  </div>

  <div class="day-bar" id="dayBar"></div>

  <div class="actions">
    <button class="action-main" id="openAllBtn" disabled>요일을 선택하세요</button>
    <div class="action-hint" id="openHint"></div>
    <div class="action-sub-row">
      <button class="action-sub" id="lunchBtn"><span class="icon">🍚</span> 점심 카페 4개</button>
      <button class="action-sub" id="momsBtn"><span class="icon">💜</span> 맘스홀릭</button>
      <button class="action-sub" id="dolbomBtn"><span class="icon">🏠</span> 돌봄매트 카페</button>
    </div>
  </div>

  <div id="cafeList"></div>

  <div class="notice">
    <div class="notice-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      팝업 차단 해제 (최초 1회)
    </div>
    버튼 클릭 후 주소창 오른쪽의 팝업 차단 아이콘 → "항상 허용" 선택하면 이후 정상 작동합니다.
  </div>
</div>

<script>
const CAFES = [
  {"region":"경기","name":"당엄모","link":"https://cafe.naver.com/ca-fe/cafes/14979990/menus/276/articles/write?boardType=L","unit":"주","count":"2","schedule":{"월":false,"화":true,"수":false,"목":true,"금":false,"토":false,"일":false}},
  {"region":"경기","name":"용인맘","link":"https://cafe.naver.com/ca-fe/cafes/15061734/menus/413/articles/write?boardType=L","unit":"주","count":"3","schedule":{"월":true,"화":false,"수":true,"목":false,"금":true,"토":false,"일":false}},
  {"region":"경기","name":"우리동네당진소식","link":"https://cafe.naver.com/ca-fe/cafes/21810887/menus/736/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"경기","name":"수원맘모여라","link":"https://cafe.naver.com/ca-fe/cafes/13276223/menus/1174/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"경기","name":"아띠아모","link":"https://cafe.naver.com/ca-fe/cafes/22897837/menus/832/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"경기","name":"맘스홀릭","link":"https://cafe.naver.com/ca-fe/cafes/10094499/menus/1064/articles/write?boardType=L","unit":"제한X","count":"","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"강서맘","link":"https://cafe.naver.com/ca-fe/cafes/25347569/menus/1161/articles/write?boardType=L","unit":"주","count":"2","schedule":{"월":false,"화":false,"수":true,"목":false,"금":true,"토":false,"일":false}},
  {"region":"부산","name":"양산맘","link":"https://cafe.naver.com/ca-fe/cafes/20655292/menus/2110/articles/write?boardType=L","unit":"주","count":"5","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":false,"일":false}},
  {"region":"부산","name":"텍폴맘","link":"https://cafe.naver.com/ca-fe/cafes/26843888/menus/1274/articles/write?boardType=L","unit":"주","count":"5","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":false,"일":false}},
  {"region":"부산","name":"대구맘 365","link":"https://cafe.naver.com/ca-fe/cafes/24000254/menus/1995/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"구지맘","link":"https://cafe.naver.com/ca-fe/cafes/28770399/menus/420/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"진해댁","link":"https://cafe.naver.com/ca-fe/cafes/14952369/menus/422/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"부경맘","link":"https://cafe.naver.com/ca-fe/cafes/18077961/menus/1489/articles/write?boardType=L","unit":"일","count":"2","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"진주엔","link":"https://cafe.naver.com/ca-fe/cafes/25684317/menus/379/articles/write?boardType=L","unit":"일","count":"2","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"정관맘스","link":"https://cafe.naver.com/ca-fe/cafes/22068083/menus/2832/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"부사맘","link":"https://cafe.naver.com/ca-fe/cafes/28251007/menus/818/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"창원부동산이야기","link":"https://cafe.naver.com/ca-fe/cafes/19547479/menus/209/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}},
  {"region":"부산","name":"울산맘","link":"https://cafe.naver.com/ca-fe/cafes/19611711/menus/633/articles/write?boardType=L","unit":"일","count":"1","schedule":{"월":true,"화":true,"수":true,"목":true,"금":true,"토":true,"일":true}}
];

const DAYS = ['월','화','수','목','금','토','일'];
const DAY_MAP = {0:'일',1:'월',2:'화',3:'수',4:'목',5:'금',6:'토'};
const LUNCH = ['맘스홀릭','대구맘 365','부경맘','진주엔'];
const DOLBOM_LINK = 'https://cafe.naver.com/ca-fe/cafes/30725831/menus/0/articles/write';
const RSHORT = {'경기':'경','부산':'부'};
let selected = null;

function today() { return DAY_MAP[new Date().getDay()]; }
function forDay(d) { return CAFES.filter(c => c.schedule[d]); }
function isWeekend(d) { return d === '토' || d === '일'; }

function init() {
  const td = today();
  document.getElementById('todayText').textContent = '오늘은 ' + td + '요일';
  const bar = document.getElementById('dayBar');
  DAYS.forEach(d => {
    const cnt = forDay(d).length + (isWeekend(d) ? 1 : 0);
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === td ? ' today' : '') + ((d==='토'||d==='일') ? ' weekend' : '');
    btn.dataset.day = d;
    btn.innerHTML = '<span class="label">' + d + '</span><span class="num">' + cnt + '개</span>';
    btn.onclick = function() { pick(d); };
    bar.appendChild(btn);
  });
  pick(td);
}

function pick(day) {
  selected = day;
  document.querySelectorAll('.day-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.day === day);
  });
  var list = forDay(day);
  var total = list.length + (isWeekend(day) ? 1 : 0);
  var btn = document.getElementById('openAllBtn');
  btn.disabled = false;
  btn.textContent = day + '요일 맘카페 ' + total + '개 한꺼번에 열기';
  document.getElementById('openHint').textContent = total + '개 탭이 새로 열립니다';
  render(day);
}

function render(day) {
  var el = document.getElementById('cafeList');
  var list = forDay(day);
  var h = '';

  // 토/일에는 돌봄매트 카페 맨 앞에 표시
  if (isWeekend(day)) {
    h += '<div class="region"><div class="region-head">';
    h += '<div class="region-icon" style="background:var(--primary);color:white">돌</div>';
    h += '<span class="region-label">돌봄매트</span>';
    h += '<span class="region-cnt">1개</span></div>';
    h += '<div class="cafe-grid">';
    h += '<div class="cafe on" onclick="window.open(\'' + DOLBOM_LINK + '\',\'_blank\')">';
    h += '<div class="cafe-check"></div>';
    h += '<span class="cafe-name">돌봄매트 카페</span>';
    h += '<div class="cafe-days">';
    DAYS.forEach(function(d) {
      var cls = 'mini-day';
      if (d === '토' || d === '일') cls += ' on';
      if (d === day) cls += ' current';
      h += '<div class="' + cls + '">' + d + '</div>';
    });
    h += '</div>';
    h += '<span class="cafe-tag t-제한X">토/일</span>';
    h += '<svg class="cafe-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
    h += '</div></div></div>';
  }

  var regions = [];
  list.forEach(function(c) { if (regions.indexOf(c.region) === -1) regions.push(c.region); });
  var h = '';
  regions.forEach(function(region) {
    var items = list.filter(function(c) { return c.region === region; });
    h += '<div class="region"><div class="region-head">';
    h += '<div class="region-icon ' + region + '">' + (RSHORT[region] || region[0]) + '</div>';
    h += '<span class="region-label">' + region + '</span>';
    h += '<span class="region-cnt">' + items.length + '개</span></div>';
    h += '<div class="cafe-grid">';
    items.forEach(function(c, i) {
      h += '<div class="cafe on" style="animation-delay:' + (i*0.03) + 's" onclick="window.open(\'' + c.link + '\',\'_blank\')">';
      h += '<div class="cafe-check"></div>';
      h += '<span class="cafe-name">' + c.name + '</span>';
      h += '<div class="cafe-days">';
      DAYS.forEach(function(d) {
        var cls = 'mini-day';
        if (c.schedule[d]) cls += ' on';
        if (d === day) cls += ' current';
        h += '<div class="' + cls + '">' + d + '</div>';
      });
      h += '</div>';
      h += '<span class="cafe-tag t-' + c.unit + '">' + c.unit + (c.count ? ' ' + c.count + '회' : '') + '</span>';
      h += '<svg class="cafe-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
      h += '</div>';
    });
    h += '</div></div>';
  });
  el.innerHTML = h;
}

document.getElementById('openAllBtn').addEventListener('click', function() {
  if (!selected) return;
  var fail = 0;
  // 토/일에는 돌봄매트 카페 먼저 열기
  if (isWeekend(selected)) {
    if (!window.open(DOLBOM_LINK, '_blank')) fail++;
  }
  var list = forDay(selected);
  list.forEach(function(c) { if (!window.open(c.link, '_blank')) fail++; });
  var total = list.length + (isWeekend(selected) ? 1 : 0);
  if (fail) document.getElementById('openHint').textContent = '⚠ ' + (total-fail) + '/' + total + '개만 열림 — 팝업 허용 필요';
});

document.getElementById('lunchBtn').addEventListener('click', function() {
  var list = CAFES.filter(function(c) { return LUNCH.indexOf(c.name) !== -1; });
  var fail = 0;
  list.forEach(function(c) { if (!window.open(c.link, '_blank')) fail++; });
  if (fail) alert((list.length-fail) + '/' + list.length + '개만 열림 — 팝업 차단 해제 필요');
});

document.getElementById('momsBtn').addEventListener('click', function() {
  var c = CAFES.find(function(c) { return c.name === '맘스홀릭'; });
  if (c) window.open(c.link, '_blank');
});

document.getElementById('dolbomBtn').addEventListener('click', function() {
  window.open(DOLBOM_LINK, '_blank');
});

init();
</script>
</body>
</html>
